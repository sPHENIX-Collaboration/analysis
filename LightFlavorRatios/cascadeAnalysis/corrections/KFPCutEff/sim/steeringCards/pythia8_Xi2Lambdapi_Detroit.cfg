! sPHENIX HF TG MD2 Pythia8 Tune for D2Kpi filtered events
! See discussions at https://indico.bnl.gov/event/10309/

! Beam settings
Beams:idA = 2212   ! first beam, p = 2212, pbar = -2212
Beams:idB = 2212   ! second beam, p = 2212, pbar = -2212
Beams:eCM = 200.   ! CM energy of collision

! Settings related to output in init(), next() and stat()
Init:showChangedSettings = on
#Next:numberCount = 0          ! print message every n events
Next:numberShowInfo = 1            ! print event information n times
#Next:numberShowProcess = 1         ! print process record n times
#Next:numberShowEvent = 1           ! print event record n times

! PDF
PDF:pSet = 17
MultipartonInteractions:bProfile = 2
MultipartonInteractions:ecmRef = 200
MultipartonInteractions:pT0Ref = 1.40
MultipartonInteractions:ecmPow = 0.135
MultipartonInteractions:coreRadius = 0.56
MultipartonInteractions:coreFraction = 0.78
ColourReconnection:range = 5.4

! Process
HardQCD:all = on
SoftQCD:inelastic = on
3312:onMode = off
-3312:onMode = off
3122:onMode = off
-3122:onMode = off
# Force Xi -> (Lambda->p pi) pi
3312:onIfMatch = -3122 211
-3312:onIfMatch = 3122 -211
3122:onIfMatch = 2212 -211
-3122:onIfMatch = -2212 211

ColourReconnection:mode = 2
TimeShower:alphaSvalue = 0.18

#ParticleDecays:limitCylinder = on
#ParticleDecays:xyMax = 0.000001
#ParticleDecays:zMax = 0.000001
