! sPHENIX OO 200GeV, Pythia8 Angantyr

! Beam settings
Beams:idA = 1000080160   ! first beam, Oxygen nucleus
Beams:idB = 1000080160   ! second beam, Oxygen nucleus
Beams:frameType = 1
Beams:eCM = 200.   ! CM energy of collision

! Oxygen nucleus settings (https://pythia8.web.cern.ch/manuals/pythia8317/HeavyIons.html)
Angantyr:NucleusModelA = 4 ! Per manual, the default nuclear charge radius (7.7) gives a reasonable description of O16
Angantyr:NucleusModelB = 4 

! Subcollision model settings
! Default HeavyIon:SigFitDefPar and HeavyIon:SigFitErr are used currently
HeavyIon:SigFitReuseInit = 3   ! (Load configuration from file if it exists, otherwise initialize from scratch and save the file.)
HeavyIon:SigFitInitFile = OO200.sigfit   
HeavyIon:SasdMpiReuseInit = 3 
HeavyIon:SasdMpiInitFile = OO200.sasd.mpi

ParticleDecays:limitTau0 = on
ParticleDecays:tau0Max = 10. ! 10 is the default value

! random seed set in the program